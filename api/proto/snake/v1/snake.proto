syntax = "proto3";

package api.proto.snake.v1;

option go_package = "GoSnakeGame/api/proto/snake/v1;snake";

service SnakeGameService {
  rpc JoinGame(JoinGameRequest) returns (stream JoinGameResponse);
  rpc SendDirection(SendDirectionRequest) returns (SendDirectionResponse);
  rpc GetTopPlayers(GetTopPlayersRequest) returns (GetTopPlayersResponse);
}

message GetTopPlayersResponse {
  repeated PlayerScore top_players = 1;
}

message PlayerScore {
  string player_name = 1;
  int32 score = 2;
}

message JoinGameRequest {
  string player_name = 1;
}

message JoinGameResponse {
  repeated Player players = 1;
  repeated Point food = 2;
}

message SendDirectionRequest {
  string player_name = 1;
  Direction direction = 2;
}

message SendDirectionResponse {}

message GetTopPlayersRequest {}

message Player {
  string name = 1;
  repeated Point body = 2;
  bool alive = 3;
}

message Point {
  int32 x = 1;
  int32 y = 2;
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_UP = 1;
  DIRECTION_DOWN = 2;
  DIRECTION_LEFT = 3;
  DIRECTION_RIGHT = 4;
}
