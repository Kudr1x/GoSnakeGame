syntax = "proto3";

package api.proto.snake.v1;

option go_package = "GoSnakeGame/api/proto/snake/v1;snake";

service SnakeGameService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc JoinGame(JoinGameRequest) returns (stream JoinGameResponse);
  rpc SendDirection(SendDirectionRequest) returns (SendDirectionResponse);
  rpc GetTopPlayers(GetTopPlayersRequest) returns (GetTopPlayersResponse);
}

enum GameMode {
  MODE_UNSPECIFIED = 0;
  MODE_SOLO = 1;
  MODE_1V1 = 2;
  MODE_FFA = 3; // 1v1v1v1
}

message ClientMessage {
  oneof payload {
    JoinGameRequest join = 1;
    SendDirectionRequest direction = 2;
    GetTopPlayersRequest top = 3;
    CreateRoomRequest create_room = 4;
  }
}

message ServerMessage {
  oneof payload {
    JoinGameResponse update = 1;
    GetTopPlayersResponse top = 2;
    CreateRoomResponse room_created = 3;
  }
}

message CreateRoomRequest {
  string player_name = 1;
  GameMode mode = 2;
}

message CreateRoomResponse {
  string room_id = 1;
  string invite_link = 2;
}

message GetTopPlayersResponse {
  repeated PlayerScore top_players = 1;
}

message PlayerScore {
  string player_name = 1;
  int32 score = 2;
}

message JoinGameRequest {
  string player_name = 1;
  string room_id = 2;
}

message JoinGameResponse {
  repeated Player players = 1;
  repeated Point food = 2;
  string room_id = 3;
  GameMode mode = 4;
}

message SendDirectionRequest {
  string player_name = 1;
  string room_id = 2;
  Direction direction = 3;
}

message SendDirectionResponse {}

message GetTopPlayersRequest {}

message Player {
  string name = 1;
  repeated Point body = 2;
  bool alive = 3;
  int32 id = 4;
  Direction direction = 5;
}

message Point {
  int32 x = 1;
  int32 y = 2;
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_UP = 1;
  DIRECTION_DOWN = 2;
  DIRECTION_LEFT = 3;
  DIRECTION_RIGHT = 4;
}
